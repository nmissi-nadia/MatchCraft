spring:
  application:
    name: matchcraft-backend
  datasource:
    # URL de connexion utilisant le nom du service Docker "db-postgres"
    url: jdbc:postgresql://${DB_HOST:db-postgres}:${DB_PORT:5432}/${DB_NAME:matchcraft}
    username: ${DB_USER:matchcraft_user}
    password: ${DB_PASSWORD:matchcraft_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080
