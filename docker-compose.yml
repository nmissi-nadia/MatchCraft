version: '3.8'

services:
  db-postgres:
    image: postgres:16
    container_name: matchcraft-postgres
    environment:
      POSTGRES_DB: matchcraft
      POSTGRES_USER: matchcraft_user
      POSTGRES_PASSWORD: matchcraft_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - matchcraft-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  matchcraft-network:
    driver: bridge
