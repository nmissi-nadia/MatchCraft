<div class="p-6 bg-gray-50 min-h-screen">
  <div class="max-w-7xl mx-auto">
    <h1 class="text-3xl font-bold text-gray-900 mb-8">Tableau de bord MatchCraft</h1>
    
    <div class="bg-white rounded-lg shadow overflow-hidden">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Entreprise / Poste</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Localisation</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Pertinence</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Statut</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
          <tr *ngFor="let app of applications" class="hover:bg-gray-50 transition-colors duration-150">
            <td class="px-6 py-4 whitespace-nowrap">
              <div class="text-sm font-medium text-gray-900">{{ app.offer.nomEntreprise }}</div>
              <div class="text-sm text-gray-500">{{ app.offer.titre }}</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
              <div class="text-sm text-gray-500">{{ app.offer.localisation }}</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
              <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-indigo-100 text-indigo-800">
                {{ app.offer.scorePertinence | number:'1.0-2' }}
              </span>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
              <span [class]="'px-2 inline-flex text-xs leading-5 font-semibold rounded-full ' + getStatusClass(app.statut)">
                {{ app.statut }}
              </span>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
              <!-- Router link omis pour simplicité -->
              <a href="#" class="text-indigo-600 hover:text-indigo-900 font-semibold">Examiner &rarr;</a>
            </td>
          </tr>
          
          <tr *ngIf="applications.length === 0">
            <td colspan="5" class="px-6 py-10 text-center text-gray-500">
              Aucune candidature trouvée. Le pipeline est vide.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
