<div class="min-h-screen bg-slate-900 text-slate-100 p-8 relative overflow-hidden font-sans">
  <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-blue-600/20 blur-[120px]"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-purple-600/20 blur-[120px]"></div>

  <div class="max-w-6xl mx-auto relative z-10 space-y-8">
    <div class="flex items-center justify-between">
      <h1 class="text-3xl font-extrabold text-white">Mon Profil & Données d'IA</h1>
      <div *ngIf="successMessage" class="px-4 py-2 bg-green-500/20 text-green-400 border border-green-500/50 rounded-lg shadow-lg animate-fade-in-out">
        {{ successMessage }}
      </div>
      <div *ngIf="errorMessage" class="px-4 py-2 bg-red-500/20 text-red-400 border border-red-500/50 rounded-lg shadow-lg">
        {{ errorMessage }}
      </div>
    </div>

    <form [formGroup]="profileForm" (ngSubmit)="saveProfile()" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <!-- Informations Personnelles -->
      <div class="glass-card rounded-2xl p-8 space-y-6">
        <h2 class="text-xl font-bold text-white mb-4 border-b border-white/10 pb-4">Informations de Base</h2>
        
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-bold text-slate-300 uppercase tracking-wide mb-2">Prénom</label>
            <input type="text" formControlName="prenom" class="w-full bg-black/30 border border-white/10 rounded-lg p-3 text-white focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-bold text-slate-300 uppercase tracking-wide mb-2">Nom</label>
            <input type="text" formControlName="nom" class="w-full bg-black/30 border border-white/10 rounded-lg p-3 text-white focus:ring-2 focus:ring-blue-500">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-bold text-slate-300 uppercase tracking-wide mb-2">Email</label>
            <input type="email" formControlName="email" class="w-full bg-black/30 border border-white/10 rounded-lg p-3 text-white focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-bold text-slate-300 uppercase tracking-wide mb-2">Téléphone</label>
            <input type="text" formControlName="telephone" class="w-full bg-black/30 border border-white/10 rounded-lg p-3 text-white focus:ring-2 focus:ring-blue-500">
          </div>
        </div>

        <div>
          <label class="block text-sm font-bold text-slate-300 uppercase tracking-wide mb-2">Titre Professionnel</label>
          <input type="text" formControlName="titreProfessionnel" class="w-full bg-black/30 border border-white/10 rounded-lg p-3 text-white focus:ring-2 focus:ring-blue-500" placeholder="ex: Développeur Full-Stack Java/Angular">
        </div>

        <!-- Compétences Tags -->
        <div>
          <label class="block text-sm font-bold text-slate-300 uppercase tracking-wide mb-2">Compétences (Tags)</label>
          <div class="p-3 bg-black/30 border border-white/10 rounded-lg min-h-[50px] flex flex-wrap gap-2 items-center focus-within:ring-2 focus-within:ring-blue-500">
            <span *ngFor="let skill of skills" class="px-3 py-1 bg-blue-500/20 text-blue-300 border border-blue-500/30 rounded-full flex items-center text-sm font-bold shadow-sm">
              {{ skill }}
              <button type="button" (click)="removeSkill(skill)" class="ml-2 hover:text-white focus:outline-none">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
              </button>
            </span>
            <input type="text" (keyup.enter)="addSkill($event)" placeholder="Ajouter une compétence et valider (Entrée)..." class="flex-grow bg-transparent border-none focus:ring-0 text-white placeholder-slate-500 outline-none">
          </div>
        </div>

        <button type="submit" [disabled]="!profileForm.valid" class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl shadow-lg transition-all transform hover:scale-105">
          Sauvegarder le profil
        </button>
      </div>

      <div class="space-y-8">
        <!-- Section GitHub -->
        <div class="glass-card rounded-2xl p-8 border-t-[4px] border-purple-500">
          <h2 class="text-xl font-bold text-white mb-4 flex items-center">
            <svg class="w-6 h-6 mr-3 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
            Synchronisation GitHub
          </h2>
          <div class="flex space-x-4">
            <div class="flex-grow">
              <label class="block text-sm font-bold text-slate-300 uppercase tracking-wide mb-2">Pseudonyme GitHub</label>
              <input type="text" formControlName="githubUsername" class="w-full bg-black/30 border border-white/10 rounded-lg p-3 text-white focus:ring-2 focus:ring-purple-500">
            </div>
            <div class="flex items-end">
              <button type="button" (click)="syncGithub()" [disabled]="isSyncing" class="px-6 py-3 bg-purple-600 hover:bg-purple-500 text-white font-bold rounded-xl shadow-[0_0_15px_rgba(168,85,247,0.4)] transition-all">
                {{ isSyncing ? 'Synchronisation...' : 'Synchroniser' }}
              </button>
            </div>
          </div>
          
          <div class="mt-4 pt-4 border-t border-white/10">
            <p class="text-sm text-slate-400 mb-2 font-bold">{{ githubProjects.length }} Projets synchronisés</p>
            <div class="max-h-[150px] overflow-y-auto custom-scrollbar space-y-2">
              <div *ngFor="let project of githubProjects" class="p-2 bg-white/5 rounded border border-white/10 text-sm text-purple-200">
                {{ project.nom }}
              </div>
            </div>
          </div>
        </div>

        <!-- Section CV Textuel -->
        <div class="glass-card rounded-2xl p-8 h-full">
          <h2 class="text-xl font-bold text-white mb-4">CV Textuel (Matière pour l'IA)</h2>
          <textarea formControlName="cvTextuel" rows="10" class="w-full bg-black/30 border border-white/10 rounded-lg p-4 text-slate-300 focus:ring-2 focus:ring-blue-500 custom-scrollbar font-mono text-sm leading-relaxed" placeholder="Collez ici l'intégralité du texte de votre CV (expériences, formations, bio)..."></textarea>
        </div>
      </div>
    </form>
  </div>
</div>
